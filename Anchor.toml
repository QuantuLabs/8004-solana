[toolchain]
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.devnet]
agent_registry_8004 = "8oo4J9tBB3Hna1jRQ3rWvJjojqM5DYTDJo5cejUuJy3C"

[programs.localnet]
agent_registry_8004 = "8oo4dC4JvBLwy5tGgiH3WwK4B9PWxL9Z4XjA2jzkQMbQ"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
costs = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/init-localnet.ts tests/e2e-costs.ts"
full = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/init-localnet.ts tests/identity-tests.ts tests/reputation-tests.ts"
revoke = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/init-localnet.ts tests/revoke-e2e.ts"
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/init-localnet.ts tests/revoke-e2e.ts tests/reputation-tests.ts"

[test]
startup_wait = 5000
shutdown_wait = 2000
upgradeable = true

[test.validator]
bind_address = "0.0.0.0"
url = "https://api.devnet.solana.com"
ledger = ".anchor/test-ledger"
rpc_port = 8899

# Clone Metaplex Core for NFT operations
[[test.validator.clone]]
address = "CoREENxT6tW1HoK8ypY1SxRMZTcVPm7R94rH4PZNhX7d"

# Load local ATOM Engine binary for CPI (new program id not on devnet yet)
[[test.genesis]]
address = "AToMufS4QD6hEXvcvBDg9m1AHeCLpmZQsyfYa5h9MwAF"
program = "../8004-atom/target/deploy/atom_engine.so"
upgradeable = true
